<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDash-Manager | Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!-- Encabezado con navegación para registro -->
    <header class="marco-superior">
        <div class="marco-superior-contenido">
            <div class="logo-y-titulo">
                <h1 class="titulo-principal">⛅ SkyDash-Manager</h1>
            </div>
            <nav class="nav-header">
                <!-- Enlace al nuevo archivo de registro -->
                <a href="registro.html" class="btn-secundario-link">Crear Cuenta</a>
            </nav>
        </div>
    </header>

    <main id="main-Principal">
        <!-- Sección de Login -->
        <section id="seccion-login" class="contenedor-centrado">
            <div class="tarjeta-login">
                <h2>Iniciar Sesión</h2>
                <form id="form-login">
                    <input type="text" id="usuario" placeholder="Usuario" required class="input-estandar">
                    <input type="password" id="password" placeholder="Contraseña" required class="input-estandar">
                    <button type="submit" class="btn-primario">Ingresar</button>
                </form>
                <!-- Mensaje de error oculto por defecto -->
                <p id="login-error" class="mensaje-error oculto">Credenciales incorrectas.</p>
            </div>
        </section>
    </main>

    <!-- Script principal que gestiona el flujo de datos -->
    <script src="app.js"></script>
</body>
</html>
