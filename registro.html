<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SkyDash</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main class="contenedor-centrado">
        <section class="tarjeta-login">
            <h2>Crear Cuenta</h2>
            <form id="form-registro">
                <input type="text" id="reg-usuario" placeholder="Nuevo Usuario" required class="input-estandar">
                <input type="password" id="reg-password" placeholder="Contraseña" required class="input-estandar">
                <button type="submit" class="btn-primario">Registrarse</button>
                <a href="index.html">Volver</a>
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
