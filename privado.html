<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Área Privada | SkyDash</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header class="marco-superior">
        <div class="marco-superior-contenido">
            <h1>Configuración</h1>
            <nav>
                <a href="dashboard.html">Volver al Dashboard</a>
            </nav>
        </div>

    <main class="contenedor-centrado">

                <p><strong>Estado:</strong> Activo</p>

            <button id="btn-cerrar-cuenta" class="btn-primario" style="background-color:red;">Eliminar Sesión</button>
        </section>

    <script src="app.js"></script>

</html>
